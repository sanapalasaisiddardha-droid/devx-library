name: Deploy DevX to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json
      - name: Install
        working-directory: landing
        run: npm ci
      # Books are served same-origin from the site (release assets send no CORS
      # headers, so the in-app reader can't fetch them cross-origin).
      - name: Point books at same-origin /books/
        working-directory: landing
        run: node gen-data.mjs
        env:
          PDF_BASE: books/
      - name: Build
        working-directory: landing
        run: npm run build
      - name: Bundle book files from the release into the site
        run: |
          mkdir -p landing/dist/books
          gh release download books-v1 --repo ${{ github.repository }} --dir landing/dist/books
          ls landing/dist/books | wc -l
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
