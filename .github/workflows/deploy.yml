name: Deploy DevX to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json
      - name: Install
        working-directory: landing
        run: npm ci
      - name: Point books at the GitHub release
        working-directory: landing
        run: node gen-data.mjs
        env:
          PDF_BASE: https://github.com/sanapalasaisiddardha-droid/devx-library/releases/download/books-v1/
      - name: Build
        working-directory: landing
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
